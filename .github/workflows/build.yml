name: Flutter APK Builder

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (dari bot)'
        required: true
        type: string
      buildType:
        description: 'Mode Build'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ─── 1. CHECKOUT ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. DOWNLOAD ZIP DARI RELEASE ──────────────────────
      - name: Download project ZIP from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📦 Downloading ZIP for tag: ${{ github.event.inputs.tag }}"
          curl -L \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.event.inputs.tag }}" \
            -o project.zip

      # ─── 3. EKSTRAK ZIP ─────────────────────────────────────
      - name: Extract project ZIP
        run: |
          mkdir project
          unzip -q project.zip -d project/
          ls -la project/

      # ─── 4. SETUP FLUTTER ──────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Check Flutter version
        run: flutter --version

      # ─── 5. INSTALL DEPENDENCIES ───────────────────────────
      - name: Install dependencies
        working-directory: ./project
        run: flutter pub get

      # ─── 6. BUILD APK ──────────────────────────────────────
      - name: Build APK
        working-directory: ./project
        run: |
          if [ "${{ github.event.inputs.buildType }}" = "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi

      # ─── 7. UPLOAD ARTIFACT ────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.buildType }}
          path: ./project/build/app/outputs/flutter-apk/*.apk
          retention-days: 7

      # ─── 8. (OPSIONAL) UPLOAD KE RELEASE ──────────────────
      - name: Upload APK to release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_FILE=$(ls ./project/build/app/outputs/flutter-apk/*.apk | head -1)
          APK_NAME=$(basename "$APK_FILE")
          echo "📤 Uploading $APK_NAME to release ${{ github.event.inputs.tag }}"
          gh release upload "${{ github.event.inputs.tag }}" "$APK_FILE" \
            --clobber \
            --repo "${{ github.repository }}"
